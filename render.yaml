services:
  - type: web
    name: dishdecode-app
    runtime: python
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn dishdecode_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: dishdecode_project.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: dishdecode-db
          property: connectionString
